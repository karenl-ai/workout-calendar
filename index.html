<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bridal Sculpt & Cardio Roadmap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF6F0;
    --ivory: #FFFDF9;
    --rose: #B76E79;
    --rose-soft: #E8CDD1;
    --rose-whisper: #F6EBEC;
    --slate: #3D4654;
    --slate-soft: #7A8496;
    --gold: #C2A265;
    --shadow: 0 2px 24px rgba(61, 70, 84, 0.07);
    --shadow-lift: 0 8px 32px rgba(61, 70, 84, 0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    color: var(--slate);
    font-family: 'Jost', 'Segoe UI', system-ui, sans-serif;
    font-weight: 400;
    line-height: 1.55;
    min-height: 100vh;
    padding: 0 20px 64px;
  }

  .wrap { max-width: 1180px; margin: 0 auto; }

  /* ---------- Header ---------- */
  header {
    text-align: center;
    padding: 56px 0 36px;
  }
  .eyebrow {
    font-size: 0.72rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--rose);
    font-weight: 500;
    margin-bottom: 14px;
  }
  h1 {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 600;
    font-size: clamp(2rem, 5.4vw, 3.4rem);
    letter-spacing: 0.14em;
    line-height: 1.15;
  }
  .header-rule {
    width: 72px;
    height: 1px;
    background: var(--gold);
    margin: 22px auto 0;
    position: relative;
  }
  .header-rule::after {
    content: "";
    position: absolute;
    left: 50%; top: 50%;
    width: 7px; height: 7px;
    background: var(--gold);
    transform: translate(-50%, -50%) rotate(45deg);
  }

  /* ---------- Pinned goals banner ---------- */
  .goals {
    background: linear-gradient(135deg, var(--rose-whisper), var(--ivory));
    border: 1px solid var(--rose-soft);
    border-radius: 18px;
    box-shadow: var(--shadow);
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 22px 26px;
    margin-bottom: 40px;
  }
  .goal {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 8px 10px;
  }
  .goal + .goal { border-left: 1px solid var(--rose-soft); padding-left: 24px; }
  .goal .icon { font-size: 1.45rem; flex-shrink: 0; }
  .goal .label {
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--rose);
    font-weight: 500;
  }
  .goal .value {
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--slate);
  }
  #countdown-days { color: var(--rose); font-weight: 600; }

  /* ---------- Calendar grid ---------- */
  .week {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 18px;
  }
  .day-card {
    background: var(--ivory);
    border: 1px solid #EFE9E0;
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 24px 22px 20px;
    display: flex;
    flex-direction: column;
    position: relative;
    transition: opacity 0.5s ease, transform 0.35s ease, box-shadow 0.35s ease, filter 0.5s ease;
  }
  .day-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lift); }

  .day-name {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 1.4rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    margin-bottom: 2px;
    transition: color 0.4s ease;
  }
  .day-tag {
    font-size: 0.64rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
    margin-bottom: 14px;
  }
  .workout-title {
    font-size: 1.02rem;
    font-weight: 500;
    margin-bottom: 8px;
    transition: all 0.4s ease;
  }
  .workout-detail {
    font-size: 0.86rem;
    font-weight: 300;
    color: var(--slate-soft);
    flex-grow: 1;
    margin-bottom: 18px;
    transition: all 0.4s ease;
  }

  .check-btn {
    font-family: 'Jost', sans-serif;
    font-size: 0.78rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--rose);
    background: transparent;
    border: 1px solid var(--rose-soft);
    border-radius: 999px;
    padding: 10px 18px;
    cursor: pointer;
    transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
  }
  .check-btn:hover { background: var(--rose); border-color: var(--rose); color: var(--ivory); }
  .check-btn:focus-visible,
  .reset-btn:focus-visible { outline: 2px solid var(--gold); outline-offset: 3px; }

  /* Wax-seal checkmark */
  .seal {
    position: absolute;
    top: -12px;
    right: -10px;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: radial-gradient(circle at 32% 30%, #CB8892, var(--rose) 62%, #9E5A65);
    color: var(--ivory);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.15rem;
    box-shadow: 0 4px 12px rgba(183, 110, 121, 0.45);
    opacity: 0;
    transform: scale(0.3) rotate(-30deg);
    transition: opacity 0.4s ease, transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
  }

  /* Completed state */
  .day-card.done {
    opacity: 0.55;
    filter: saturate(0.35);
    background: #F5F2EC;
  }
  .day-card.done:hover { transform: none; box-shadow: var(--shadow); }
  .day-card.done .workout-title,
  .day-card.done .workout-detail,
  .day-card.done .day-name {
    text-decoration: line-through;
    text-decoration-color: rgba(122, 132, 150, 0.6);
    text-decoration-thickness: 1px;
    color: var(--slate-soft);
  }
  .day-card.done .check-btn {
    color: var(--slate-soft);
    border-color: #DDD6CB;
    background: transparent;
    cursor: pointer;
  }
  .day-card.done .seal { opacity: 1; transform: scale(1) rotate(0deg); }

  /* ---------- Footer ---------- */
  .footer {
    text-align: center;
    margin-top: 44px;
  }
  .progress-note {
    font-size: 0.82rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--slate-soft);
    margin-bottom: 18px;
  }
  .progress-note strong { color: var(--rose); font-weight: 600; }
  .reset-btn {
    font-family: 'Jost', sans-serif;
    font-size: 0.78rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--slate);
    background: var(--ivory);
    border: 1px solid #E3DCD1;
    border-radius: 999px;
    padding: 12px 30px;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
  }
  .reset-btn:hover { background: var(--slate); border-color: var(--slate); color: var(--ivory); }

  /* ---------- Responsive ---------- */
  @media (max-width: 860px) {
    .goals { grid-template-columns: 1fr; gap: 4px; padding: 18px 20px; }
    .goal + .goal { border-left: none; border-top: 1px solid var(--rose-soft); padding-left: 10px; padding-top: 14px; }
    header { padding: 40px 0 28px; }
  }
  @media (max-width: 480px) {
    body { padding: 0 14px 48px; }
    .week { grid-template-columns: 1fr; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">Weekly Training Ritual</div>
    <h1>BRIDAL SCULPT &amp; CARDIO ROADMAP</h1>
    <div class="header-rule"></div>
  </header>

  <section class="goals" aria-label="Pinned goals">
    <div class="goal">
      <span class="icon">💦</span>
      <div>
        <div class="label">Daily Hydration Target</div>
        <div class="value">90–100 oz (3 Liters)</div>
      </div>
    </div>
    <div class="goal">
      <span class="icon">🚀</span>
      <div>
        <div class="label">Primary Target</div>
        <div class="value">Boost VO2 Max &amp; Upper Body Definition</div>
      </div>
    </div>
    <div class="goal">
      <span class="icon">🌴</span>
      <div>
        <div class="label">Destination Countdown</div>
        <div class="value">Cabo (July 24) · <span id="countdown-days"></span></div>
      </div>
    </div>
  </section>

  <main class="week" id="week"></main>

  <div class="footer">
    <div class="progress-note" id="progress-note"></div>
    <button class="reset-btn" id="reset-btn" type="button">Reset Week</button>
  </div>

</div>

<script>
  const SCHEDULE = [
    {
      day: "Sunday",
      tag: "Run + Strength",
      title: "Aerobic Base Run + Lower Body Circuit 🔥",
      detail: "The Run: smooth, steady 20–25 min to get the heart rate up. The Strength Finish: 20-min low-impact leg circuit — slow, controlled squats, lunges & glute bridges."
    },
    {
      day: "Monday",
      tag: "Spin + Arms",
      title: "Cycling Class 🚴 + 12-Min Bridal Arms",
      detail: "Execution: Run arms right before or after spin class."
    },
    {
      day: "Tuesday",
      tag: "Walk + Core",
      title: "Light Power Walk + Standing Abs",
      detail: "Low-impact day. Brisk pace on the walk, then standing core work — no floor required."
    },
    {
      day: "Wednesday",
      tag: "Full Body",
      title: "Final Full-Body Sweat 🔥",
      detail: "Aerobic base run or power walk — last big sweat session before the trip."
    },
    {
      day: "Thursday",
      tag: "Strength",
      title: "Low-Impact Lower Body Strength (Morning)",
      detail: "Morning session. Joint-friendly lower body work to close out the week."
    },
    {
      day: "Friday",
      tag: "Destination",
      title: "Cabo! 🌴",
      detail: "You made it — enjoy every second."
    },
    {
      day: "Saturday",
      tag: "Destination",
      title: "Cabo 🌴",
      detail: "Beach, pool, repeat."
    }
  ];

  const STORAGE_KEY = "bridalSculptRoadmap.completedDays";

  function loadCompleted() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : {};
    } catch (e) {
      return {};
    }
  }

  function saveCompleted(state) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) { /* storage unavailable; app still works for this session */ }
  }

  let completed = loadCompleted();

  const weekEl = document.getElementById("week");
  const noteEl = document.getElementById("progress-note");

  function render() {
    weekEl.innerHTML = "";
    SCHEDULE.forEach(item => {
      const isDone = !!completed[item.day];

      const card = document.createElement("article");
      card.className = "day-card" + (isDone ? " done" : "");
      card.dataset.day = item.day;

      card.innerHTML = `
        <div class="seal" aria-hidden="true">✓</div>
        <div class="day-name">${item.day}</div>
        <div class="day-tag">${item.tag}</div>
        <div class="workout-title">${item.title}</div>
        <div class="workout-detail">${item.detail}</div>
        <button class="check-btn" type="button" aria-pressed="${isDone}">
          ${isDone ? "Completed ✓ (tap to undo)" : "Complete Workout"}
        </button>
      `;

      card.querySelector(".check-btn").addEventListener("click", () => {
        completed[item.day] = !completed[item.day];
        if (!completed[item.day]) delete completed[item.day];
        saveCompleted(completed);
        render();
      });

      weekEl.appendChild(card);
    });
    updateNote();
  }

  function updateNote() {
    const doneCount = Object.keys(completed).length;
    noteEl.innerHTML = doneCount === 7
      ? "<strong>Perfect week — all 7 sessions complete. 👰</strong>"
      : `<strong>${doneCount}</strong> of 7 sessions complete this week`;
  }

  document.getElementById("reset-btn").addEventListener("click", () => {
    completed = {};
    saveCompleted(completed);
    render();
  });

  // Cabo countdown — targets July 24 of the current year (rolls to next year after)
  function updateCountdown() {
    const now = new Date();
    let target = new Date(now.getFullYear(), 6, 24); // July = month index 6
    if (now > target) target = new Date(now.getFullYear() + 1, 6, 24);
    const days = Math.ceil((target - now) / 86400000);
    document.getElementById("countdown-days").textContent =
      days === 0 ? "Today! 🎉" : days + (days === 1 ? " day to go" : " days to go");
  }

  updateCountdown();
  render();
</script>
</body>
</html>
